<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.gds.gov.uk/assets/govuk-template.css">
    <title>Space Travel Service - Details</title>
</head>
<body>
    <h1>Enter Your Details</h1>
    <form action="destination.html" method="GET" onsubmit="return validateForm()">
        <label for="full-name">Full Name:</label>
        <textarea id="full-name" name="full-name" required></textarea>
        
        <label for="address">Address:</label>
        <textarea id="address" name="address" required></textarea>
        
        <button type="submit" class="govuk-button">Continue</button>
        <!-- Removed redundant hidden input fields -->
    </form>
</body>
</html>
